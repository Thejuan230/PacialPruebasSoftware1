<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>El Golem - Registro</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <img src="https://e7.pngegg.com/pngimages/677/272/png-clipart-clash-of-clans-clash-royale-golem-goblin-witchcraft-clash-of-clans-game-fictional-character.png" 
           alt="El Golem" class="golem-image">
      <h1>Únete a El Golem</h1>
      <p class="login-subtitle">Crea tu cuenta y comienza a comprar</p>
    </div>
    
    <div class="login-form-container">
      <h2>Crear Cuenta</h2>
      <form id="formRegister">
        <div class="input-group">
          <input type="text" id="name" placeholder="Nombre completo" required>
        </div>
        <div class="input-group">
          <input type="email" id="email" placeholder="Correo electrónico" required>
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Contraseña" required>
        </div>
        <button type="submit" class="login-btn">REGISTRAR</button>
      </form>
      
      <div class="login-footer">
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
      </div>
    </div>
  </div>
  <script type="module" src="../js/register.js"></script>
</body>
</html>
