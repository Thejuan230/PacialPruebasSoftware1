<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>El Golem - Login</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <img src="https://e7.pngegg.com/pngimages/677/272/png-clipart-clash-of-clans-clash-royale-golem-goblin-witchcraft-clash-of-clans-game-fictional-character.png" 
           alt="El Golem" class="golem-image">
      <h1>Bienvenido a El Golem</h1>
      <p class="login-subtitle">Tu tienda online de confianza</p>
    </div>
    
    <div class="login-form-container">
      <h2>Iniciar Sesión</h2>
      <form id="formLogin">
        <div class="input-group">
          <input type="email" id="email" placeholder="Correo electrónico" required>
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Contraseña" required>
        </div>
        <button type="submit" class="login-btn">INGRESAR</button>
      </form>
      
      <div class="login-footer">
        <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
      </div>
    </div>
  </div>
  <script type="module" src="../js/login.js"></script>
</body>
</html>
