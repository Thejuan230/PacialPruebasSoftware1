<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Gestión de Ventas</title>
  <link rel="stylesheet" href="../css/ventas.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="container ventas-container">
    <div class="ventas-header">
      <h1>💰 Gestión de Ventas</h1>
      <p class="ventas-subtitle">Registra nuevas ventas y consulta el historial</p>
    </div>

    <!-- Formulario de nueva venta -->
    <div class="venta-section">
      <h2>🛒 Nueva Venta</h2>
      <div class="form-group">
        <label for="clienteSelect">Cliente:</label>
        <select id="clienteSelect" class="form-select"></select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="productoSelect">Producto:</label>
          <select id="productoSelect" class="form-select"></select>
        </div>
        <div class="form-group">
          <label for="cantidad">Cantidad:</label>
          <input type="number" id="cantidad" value="1" min="1" class="form-input" />
        </div>
        <div class="form-group">
          <button id="btnAdd" class="btn-add">➕ Agregar</button>
        </div>
      </div>

      <div class="items-section">
        <h3>📋 Items en la Venta</h3>
        <div class="table-container">
          <table id="itemsTable" class="ventas-table">
            <thead>
              <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio Unidad</th>
                <th>Subtotal</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>
      </div>

      <div class="total-section">
        <div class="total-display">
          <span class="total-label">Total: $</span>
          <span id="adminTotal" class="total-amount">0.00</span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="admin_metodo_pago">Método de Pago:</label>
            <select id="admin_metodo_pago" class="form-select">
              <option value="efectivo">💵 Efectivo</option>
              <option value="tarjeta">💳 Tarjeta</option>
            </select>
          </div>
          <div class="form-group">
            <button id="btnSubmit" class="btn-submit">✅ Registrar Venta</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Historial de ventas -->
    <div class="historial-section">
      <h2>📊 Historial de Ventas</h2>
      <div id="historial" class="historial-container"></div>
    </div>
  </div>

  <script src="../js/navigation.js"></script>
  <script type="module" src="../js/adminVentas.js"></script>
</body>
</html>
